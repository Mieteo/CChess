# Render.com infrastructure-as-code.
# Push this file together with your code; Render UI reads it automatically.
#
# To deploy:
#   1. Create a new "Blueprint Instance" on Render dashboard
#   2. Connect your GitHub repo
#   3. Point to /cchess-backend (root) as the service folder
#   4. Set the secret FIREBASE_SERVICE_ACCOUNT_JSON via dashboard
#      (paste the FULL contents of serviceAccount.json from Firebase Console)
#
# Free tier note: Render free web services sleep after 15 min of inactivity.
# First WS connection after sleep takes ~30s to wake. Upgrade to Starter
# ($7/month) for always-on if you need consistent latency.

services:
  - type: web
    name: cchess-backend
    env: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    region: singapore # gần Việt Nam nhất
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8080
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false # dashboard sẽ prompt nhập secret này
      - key: NODE_ENV
        value: production
