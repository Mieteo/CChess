<body class="bg-background text-on-background font-body-md h-screen flex flex-col overflow-hidden">
<!-- Top AppBar -->

<div class="w-8 h-8 rounded-full overflow-hidden border border-outline">

<button class="text-primary dark:text-primary-fixed-dim hover:opacity-80 transition-opacity">

</button>
</header>

<div class="w-10 h-10 rounded-full overflow-hidden border-2 border-deep-navy-black">

</div>
</div>
</div>
