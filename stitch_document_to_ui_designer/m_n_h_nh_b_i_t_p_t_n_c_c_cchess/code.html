            position: relative;
        }
        .board-line-h {
            position: absolute;
            left: 5%; right: 5%;
            height: 1.5px;
            background-color: #5C3A1E;

        }
        .piece {
            z-index: 10;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Noto Serif', serif;
            font-weight: 700;
            box-shadow: 0 4px 6px rgba(92, 58, 30, 0.4);
            border: 2px solid #D4A96A;
        }
        .piece.red {
            background: linear-gradient(135deg, #F5E6C8, #D4A96A);
