<!DOCTYPE html>

<html class="dark" lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>CChess - Cài Đặt</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                        "tertiary": "#a3ced6",
                        "outline-variant": "#50443d",
                        "surface-container-highest": "#393431",
                        "on-surface-variant": "#d4c3b9",
                        "teal-success": "#4A7C59",
                        "secondary-fixed": "#ffddb0",

                        "on-error": "#690005",
                        "on-secondary-container": "#d9ae6e",

                        "primary-container": "#5c3a1e",

                        "inverse-surface": "#eae1dc",
                        "on-tertiary-fixed": "#001f24",
                        "surface-container-high": "#2e2926",
                        "surface-variant": "#393431",
                        "error": "#ffb4ab",
                        "shadow-brown": "#5C3A1E33",
                        "primary": "#efbc97",
                        "surface-dim": "#161310",
                        "surface": "#161310",

                        "inverse-primary": "#7c5638",

                        "parchment-tan": "#7D5A3C",

                    },
                    "borderRadius": {

                    "fontSize": {

                        "mono-timer": ["18px", {"lineHeight": "24px", "fontWeight": "700"}],
                        "heading-md": ["18px", {"lineHeight": "24px", "fontWeight": "600"}],
                        "caption-sm": ["12px", {"lineHeight": "16px", "fontWeight": "400"}],
                        "title-lg": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}]

                }
            }
        }

<style>
        body {
            background-color: theme('colors.background');
            color: theme('colors.on-background');
        }
        
        /* Custom styles for sliders to match brand */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: theme('colors.accent-gold');
            cursor: pointer;
            margin-top: -8px; /* You need to specify a margin in Chrome, but in Firefox and IE it is automatic */
            box-shadow: 0 0 5px theme('colors.shadow-brown');
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: theme('colors.wood-dark');
            border-radius: 2px;
        }
        
        /* Custom Switch */
        .toggle-checkbox:checked {
            right: 0;
            border-color: theme('colors.accent-gold');
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: theme('colors.accent-gold');
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="min-h-screen pb-xxl">
<!-- TopAppBar -->
<header class="bg-wood-dark dark:bg-surface-container docked full-width top-0 bg-gradient-to-b from-wood-dark to-charcoal-dark shadow-brown shadow-md flex justify-between items-center w-full px-base py-sm z-50 sticky">
<button class="text-parchment-tan hover:opacity-80 transition-opacity p-sm rounded-full active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="text-primary dark:text-primary-fixed font-display-calligraphy text-display-calligraphy text-accent-gold text-title-lg text-center absolute left-1/2 transform -translate-x-1/2">Cài Đặt</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<main class="px-base py-lg max-w-3xl mx-auto space-y-xl">
<!-- Âm thanh & Nhạc nền Section -->
<section>
<h2 class="font-heading-md text-heading-md text-wood-light mb-md border-b border-wood-dark pb-xs uppercase tracking-widest text-sm">Âm thanh &amp; Nhạc nền</h2>
<div class="bg-ivory-panel rounded-lg shadow-brown shadow-md p-base space-y-lg text-ink-black relative overflow-hidden">
<!-- Subtle texture overlay -->
<div class="absolute inset-0 opacity-5 pointer-events-none" style="background-image: url('data:image/svg+xml,%3Csvg width=\'100\' height=\'100\' viewBox=\'0 0 100 100\' xmlns=\'http://www.w3.org/2000/svg\'%3E%3Cfilter id=\'noise\'%3E%3CfeTurbulence type=\'fractalNoise\' baseFrequency=\'0.8\' numOctaves=\'4\' stitchTiles=\'stitch\'/%3E%3C/filter%3E%3Crect width=\'100\' height=\'100\' filter=\'url(%23noise)\' opacity=\'0.5\'/%3E%3C/svg%3E');"></div>
<!-- Nhạc nền Slider -->
<div class="relative z-10 flex items-center space-x-md">
<span class="material-symbols-outlined text-wood-dark" data-icon="music_note">music_note</span>
<div class="flex-grow">
<div class="flex justify-between mb-xs">
<label class="font-body-md text-body-md font-semibold">Nhạc nền</label>
<span class="font-caption-sm text-caption-sm text-wood-dark">75%</span>
</div>
<input class="w-full" max="100" min="0" type="range" value="75"/>
</div>
</div>
<!-- Hiệu ứng Slider -->
<div class="relative z-10 flex items-center space-x-md">
<span class="material-symbols-outlined text-wood-dark" data-icon="volume_up">volume_up</span>
<div class="flex-grow">
<div class="flex justify-between mb-xs">
<label class="font-body-md text-body-md font-semibold">Hiệu ứng (tiếng quân cờ, chiếu tướng)</label>
<span class="font-caption-sm text-caption-sm text-wood-dark">100%</span>
</div>
<input class="w-full" max="100" min="0" type="range" value="100"/>
</div>
</div>
<!-- Rung Switch -->
<div class="relative z-10 flex items-center justify-between pt-sm border-t border-parchment-tan border-opacity-30">
<div class="flex items-center space-x-md">
<span class="material-symbols-outlined text-wood-dark" data-icon="vibration">vibration</span>
<label class="font-body-md text-body-md font-semibold">Rung khi đến lượt</label>
</div>
<div class="relative inline-block w-12 mr-2 align-middle select-none transition duration-200 ease-in">
<input checked="" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer z-10 transition-all duration-300" id="toggle-vibrate" name="toggle" type="checkbox"/>
<label class="toggle-label block overflow-hidden h-6 rounded-full bg-wood-dark cursor-pointer transition-colors duration-300" for="toggle-vibrate"></label>
</div>
</div>
</div>
</section>
<!-- Giao diện bàn cờ Section -->
<section>
<h2 class="font-heading-md text-heading-md text-wood-light mb-md border-b border-wood-dark pb-xs uppercase tracking-widest text-sm">Giao diện bàn cờ</h2>
<div class="bg-ivory-panel rounded-lg shadow-brown shadow-md p-base space-y-lg text-ink-black relative overflow-hidden">
<div class="absolute inset-0 opacity-5 pointer-events-none" style="background-image: url('data:image/svg+xml,%3Csvg width=\'100\' height=\'100\' viewBox=\'0 0 100 100\' xmlns=\'http://www.w3.org/2000/svg\'%3E%3Cfilter id=\'noise\'%3E%3CfeTurbulence type=\'fractalNoise\' baseFrequency=\'0.8\' numOctaves=\'4\' stitchTiles=\'stitch\'/%3E%3C/filter%3E%3Crect width=\'100\' height=\'100\' filter=\'url(%23noise)\' opacity=\'0.5\'/%3E%3C/svg%3E');"></div>
<!-- Loại quân cờ -->
<div class="relative z-10">
<label class="font-body-md text-body-md font-semibold block mb-sm">Loại quân cờ</label>
<div class="grid grid-cols-2 gap-md">
<button class="bg-wood-dark text-parchment-tan border border-accent-gold p-sm rounded text-center font-button-text text-button-text shadow-inner transition-transform active:scale-95">
                            Hán tự truyền thống
                        </button>
<button class="bg-transparent text-wood-dark border border-wood-dark p-sm rounded text-center font-button-text text-button-text hover:bg-wood-dark hover:bg-opacity-10 transition-colors">
                            Hình vẽ hiện đại
                        </button>
</div>
</div>
<!-- Màu sắc bàn cờ -->
<div class="relative z-10">
<label class="font-body-md text-body-md font-semibold block mb-sm">Màu sắc bàn cờ</label>
<div class="grid grid-cols-3 gap-sm">
<div class="flex flex-col items-center gap-xs cursor-pointer">
<div class="w-16 h-16 rounded-full border-2 border-accent-gold bg-wood-dark shadow-md flex items-center justify-center relative">
<span class="material-symbols-outlined text-accent-gold" data-icon="check" data-weight="fill">check</span>
</div>
<span class="font-caption-sm text-caption-sm text-center">Gỗ trầm</span>
</div>
<div class="flex flex-col items-center gap-xs cursor-pointer opacity-70 hover:opacity-100 transition-opacity">
<div class="w-16 h-16 rounded-full border-2 border-transparent bg-[#dcb484] shadow-md"></div>
<span class="font-caption-sm text-caption-sm text-center">Gỗ sáng</span>
</div>
<div class="flex flex-col items-center gap-xs cursor-pointer opacity-70 hover:opacity-100 transition-opacity">
<div class="w-16 h-16 rounded-full border-2 border-transparent bg-gradient-to-br from-[#e0e0e0] to-[#9e9e9e] shadow-md"></div>
<span class="font-caption-sm text-caption-sm text-center">Thủy mặc</span>
</div>
</div>
</div>
<!-- Nước đi gợi ý -->
<div class="relative z-10 flex items-center justify-between pt-sm border-t border-parchment-tan border-opacity-30">
<div class="flex items-center space-x-md">
<span class="material-symbols-outlined text-wood-dark" data-icon="tips_and_updates">tips_and_updates</span>
<label class="font-body-md text-body-md font-semibold">Hiển thị nước đi gợi ý</label>
</div>
<div class="relative inline-block w-12 mr-2 align-middle select-none transition duration-200 ease-in">
<input class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer z-10 transition-all duration-300" id="toggle-hints" name="toggle" type="checkbox"/>
<label class="toggle-label block overflow-hidden h-6 rounded-full bg-parchment-tan bg-opacity-50 cursor-pointer transition-colors duration-300" for="toggle-hints"></label>
</div>
</div>
</div>
</section>
<!-- Thông báo & Bảo mật Section -->
<section>
<h2 class="font-heading-md text-heading-md text-wood-light mb-md border-b border-wood-dark pb-xs uppercase tracking-widest text-sm">Thông báo &amp; Bảo mật</h2>
<div class="bg-ivory-panel rounded-lg shadow-brown shadow-md text-ink-black relative overflow-hidden divide-y divide-parchment-tan divide-opacity-30">
<div class="p-base flex items-center justify-between">
<div class="flex items-center space-x-md">
<span class="material-symbols-outlined text-wood-dark" data-icon="emoji_events">emoji_events</span>
<label class="font-body-md text-body-md font-semibold">Thông báo giải đấu mới</label>
</div>
<div class="relative inline-block w-12 mr-2 align-middle select-none">
<input checked="" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer z-10 transition-all duration-300" id="toggle-tournaments" name="toggle" type="checkbox"/>
<label class="toggle-label block overflow-hidden h-6 rounded-full bg-wood-dark cursor-pointer transition-colors duration-300" for="toggle-tournaments"></label>
</div>
</div>
<div class="p-base flex items-center justify-between">
<div class="flex items-center space-x-md">
<span class="material-symbols-outlined text-wood-dark" data-icon="group">group</span>
<label class="font-body-md text-body-md font-semibold">Thông báo từ bạn bè</label>
</div>
<div class="relative inline-block w-12 mr-2 align-middle select-none">
<input checked="" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer z-10 transition-all duration-300" id="toggle-friends" name="toggle" type="checkbox"/>
<label class="toggle-label block overflow-hidden h-6 rounded-full bg-wood-dark cursor-pointer transition-colors duration-300" for="toggle-friends"></label>
</div>
</div>
<button class="w-full p-base flex items-center justify-between hover:bg-wood-dark hover:bg-opacity-5 transition-colors text-left">
<div class="flex items-center space-x-md">
<span class="material-symbols-outlined text-wood-dark" data-icon="lock">lock</span>
<span class="font-body-md text-body-md font-semibold">Thay đổi mật khẩu</span>
</div>
<span class="material-symbols-outlined text-parchment-tan" data-icon="chevron_right">chevron_right</span>
</button>
<button class="w-full p-base flex items-center justify-between hover:bg-wood-dark hover:bg-opacity-5 transition-colors text-left">
<div class="flex items-center space-x-md">
<span class="material-symbols-outlined text-wood-dark" data-icon="devices">devices</span>
<span class="font-body-md text-body-md font-semibold">Quản lý thiết bị đăng nhập</span>
</div>
<span class="material-symbols-outlined text-parchment-tan" data-icon="chevron_right">chevron_right</span>
</button>
</div>
</section>
<!-- Hỗ trợ Section -->
<section>
<h2 class="font-heading-md text-heading-md text-wood-light mb-md border-b border-wood-dark pb-xs uppercase tracking-widest text-sm">Hỗ trợ</h2>
<div class="bg-ivory-panel rounded-lg shadow-brown shadow-md text-ink-black relative overflow-hidden divide-y divide-parchment-tan divide-opacity-30">
<button class="w-full p-base flex items-center justify-between hover:bg-wood-dark hover:bg-opacity-5 transition-colors text-left">
<div class="flex items-center space-x-md">
<span class="material-symbols-outlined text-wood-dark" data-icon="gavel">gavel</span>
<span class="font-body-md text-body-md font-semibold">Điều lệ &amp; Luật chơi</span>
</div>
<span class="material-symbols-outlined text-parchment-tan" data-icon="chevron_right">chevron_right</span>
</button>
<button class="w-full p-base flex items-center justify-between hover:bg-wood-dark hover:bg-opacity-5 transition-colors text-left">
<div class="flex items-center space-x-md">
<span class="material-symbols-outlined text-wood-dark" data-icon="contact_support">contact_support</span>
<span class="font-body-md text-body-md font-semibold">Liên hệ hỗ trợ</span>
</div>
<span class="material-symbols-outlined text-parchment-tan" data-icon="chevron_right">chevron_right</span>
</button>
<button class="w-full p-base flex items-center justify-between hover:bg-wood-dark hover:bg-opacity-5 transition-colors text-left">
<div class="flex items-center space-x-md">
<span class="material-symbols-outlined text-wood-dark" data-icon="star">star</span>
<span class="font-body-md text-body-md font-semibold">Đánh giá ứng dụng</span>
</div>
<span class="material-symbols-outlined text-parchment-tan" data-icon="chevron_right">chevron_right</span>
</button>
</div>
</section>
<!-- Đăng xuất -->
<div class="pt-lg pb-xxl">
<button class="w-full border font-button-text text-button-text py-md shadow-brown shadow-sm flex justify-center items-center gap-sm active:scale-95 transition-transform bg-vermilion-red text-white rounded-xl" style="background-color: #8B0000; border-radius: 12px;">
<span class="material-symbols-outlined" data-icon="logout">logout</span>
                Đăng xuất
            </button>
<p class="text-center font-caption-sm text-caption-sm text-parchment-tan mt-md opacity-70">Phiên bản 2.1.0 (Build 84)</p>
</div>
</main>
</body></html>
