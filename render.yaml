# Render.com infrastructure-as-code — đặt ở ROOT repo (Render chỉ scan root).
#
# Backend code thực tế nằm ở ./cchess-backend/, paths dưới đã trỏ tới đó.
#
# Deploy:
#   1. Push file này (+ cchess-backend/) lên GitHub
#   2. Render dashboard → New + → Blueprint → chọn repo
#   3. Render đọc render.yaml + tạo service
#   4. Render UI prompt nhập secret FIREBASE_SERVICE_ACCOUNT_JSON
#      (paste toàn bộ nội dung serviceAccount.json từ Firebase Console)
#
# Free tier note: web service ngủ sau 15 min idle. First WS connect sau
# wake ~30s. Upgrade Starter ($7/mo) nếu cần always-on.

services:
  - type: web
    name: cchess-backend
    env: docker
    rootDir: cchess-backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    region: singapore # gần Việt Nam nhất
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8080
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false # Render dashboard sẽ prompt nhập secret này
      - key: NODE_ENV
        value: production
  - type: web
    name: cchess-engine
    env: docker
    rootDir: cchess-backend
    dockerfilePath: ./Dockerfile.engine
    dockerContext: .
    # Free is enough for product smoke testing; upgrade to standard before real
    # traffic if latency/cold-starts become unacceptable.
    plan: free
    region: singapore
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8090
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: NODE_ENV
        value: production
      - key: ENGINE_THREADS
        value: 1
      - key: ENGINE_HASH_MB
        value: 128
      - key: MAX_CONCURRENCY
        value: 1
      - key: DEFAULT_MOVETIME_MS
        value: 600
      - key: ENGINE_TASK_TIMEOUT_MS
        value: 30000
      - key: ENGINE_SEARCH_TIMEOUT_MS
        value: 30000
      - key: ENGINE_INIT_TIMEOUT_MS
        value: 30000
      - key: MAX_MOVETIME_MS
        value: 3000
